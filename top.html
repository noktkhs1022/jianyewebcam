<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    canvas { display: block; }

    #hover-label {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      font-family: 'VT323', monospace;
      font-size: 15px;
      line-height: 1;
      letter-spacing: 0.12em;
      color: black;
      border: 1px solid rgba(0, 0, 0, 0.50);
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      padding: 9px 22px 7px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      cursor: pointer;
      user-select: none;
    }

    @keyframes text-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.12; }
    }
    #hover-text.blink {
      animation: text-blink 1.1s ease-in-out infinite;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<div id="hover-label"><span id="hover-text"></span></div>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const IS_MOBILE = window.innerWidth < 768;
const clock = new THREE.Clock();

// ─── Renderer ────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: !IS_MOBILE, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, IS_MOBILE ? 1.5 : 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(renderer.domElement);

// ─── Scene / Camera ──────────────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.2, 9.0);
camera.lookAt(0, 0.2, 0);

// ─── Lighting ────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 1.35));
const keyLight = new THREE.DirectionalLight(0xffffff, 1.55);
keyLight.position.set(2.8, 3.0, 4.0);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xffffff, 0.75);
fillLight.position.set(-2.0, 1.5, 2.8);
scene.add(fillLight);

// ─── Bones ───────────────────────────────────────────────
let headBone = null, neckBone = null;

// ─── Wire overlay ────────────────────────────────────────
const texMeshes  = [];
const wireMeshes = [];

function buildWireOverlay(model) {
  model.traverse((obj) => {
    if (!obj.isSkinnedMesh) return;
    const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
    mats.forEach(m => { m.transparent = true; m.opacity = 1; });
    texMeshes.push({ mesh: obj, mats });

    const wireMat = new THREE.MeshBasicMaterial({
      color: 0x333333,
      wireframe: true,
      transparent: true,
      opacity: 0
    });
    const wm = new THREE.SkinnedMesh(obj.geometry, wireMat);
    wm.bind(obj.skeleton, obj.bindMatrix);
    wm.position.copy(obj.position);
    wm.rotation.copy(obj.rotation);
    wm.scale.copy(obj.scale);
    obj.parent.add(wm);
    wireMeshes.push(wm);
  });
}

// ─── Hover → Wire blend（hoverProgで直接制御）────────────
function updateCycle() {
  if (texMeshes.length === 0) return;
  texMeshes.forEach(({ mats }) => mats.forEach(m => { m.opacity = 1 - hoverProg; }));
  wireMeshes.forEach(wm => { wm.material.opacity = hoverProg; });
}

// ─── Hover detection ─────────────────────────────────────
const MODEL_NDC    = { xMin: -0.28, xMax: 0.28, yMin: -0.42, yMax: 0.52 };
let   hoverProg    = 0;
let   hoverStartTime = null;
const HOVER_DWELL  = 0.4;   // 発動までの待機秒
const HOVER_IN     = 1.5;   // /秒
const HOVER_OUT    = 0.8;   // /秒

function isHoveringModel() {
  if (!mouseMoved) return false;
  return mouse.x > MODEL_NDC.xMin && mouse.x < MODEL_NDC.xMax
      && mouse.y > MODEL_NDC.yMin && mouse.y < MODEL_NDC.yMax;
}

// ─── Hover label（B）────────────────────────────────────
const CAPTURE_URL = 'https://www.jianye.online/capture';
const labelEl     = document.getElementById('hover-label');
const textEl      = document.getElementById('hover-text');
const TYPE_TEXT   = 'WEBCAM / CAPTURE';
const TYPE_SPEED  = 72; // ms/char
let typeTimer     = null;
let typeIndex     = 0;
let typeComplete  = false;
let hoverWasActive = false;

function startTypewriter() {
  clearTimeout(typeTimer);
  typeIndex    = 0;
  typeComplete = false;
  textEl.textContent = '';
  textEl.classList.remove('blink');

  function typeNext() {
    if (typeIndex < TYPE_TEXT.length) {
      textEl.textContent += TYPE_TEXT[typeIndex++];
      typeTimer = setTimeout(typeNext, TYPE_SPEED);
    } else {
      typeComplete = true;
      textEl.classList.add('blink');
    }
  }
  typeNext();
}

function resetLabel() {
  clearTimeout(typeTimer);
  typeComplete = false;
  textEl.classList.remove('blink');
  textEl.textContent = '';
}

labelEl.addEventListener('click', () => {
  window.open(CAPTURE_URL, '_blank');
});

// ─── Spring-damper ───────────────────────────────────────
const cur = { ry: 0, rx: 0, rz: 0 };
const vel = { ry: 0, rx: 0, rz: 0 };
const SPRING  = 0.055;
const DAMPING = 0.82;

// ─── Input ───────────────────────────────────────────────
const mouse = { x: 0, y: 0 };
let lastMoveTime = -999;
let mouseMoved   = false;

window.addEventListener('mousemove', (e) => {
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -((e.clientY / window.innerHeight) * 2 - 1);
  lastMoveTime = clock.getElapsedTime();
  mouseMoved = true;
});
window.addEventListener('touchmove', (e) => {
  const t = e.touches[0];
  mouse.x =  (t.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -((t.clientY / window.innerHeight) * 2 - 1);
  lastMoveTime = clock.getElapsedTime();
  mouseMoved = true;
}, { passive: true });

// ─── postMessage（Wix埋め込み時）────────────────────────
window.addEventListener('message', (e) => {
  const d = e.data;
  if (d && typeof d.mx === 'number' && typeof d.my === 'number') {
    mouse.x = d.mx;
    mouse.y = d.my;
    lastMoveTime = clock.getElapsedTime();
    mouseMoved = true;
  }
});

// ─── Idle state machine ──────────────────────────────────
let idleState   = 'track';
let stateStartT = 0;
let motionType  = 0;
const idleTgt   = { ry: 0, rx: 0, rz: 0 };

function easeInOut(p) {
  return p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
}

function updateIdle(t) {
  const sinceMove = t - lastMoveTime;

  if (sinceMove < 0.4 && idleState !== 'track') {
    idleState = 'track'; stateStartT = t;
    idleTgt.ry = idleTgt.rx = idleTgt.rz = 0;
    return;
  }

  switch (idleState) {
    case 'track':
      idleTgt.ry = idleTgt.rx = idleTgt.rz = 0;
      if (sinceMove > 2.5) { idleState = 'curious'; stateStartT = t; }
      break;
    case 'curious': {
      const p = easeInOut(Math.min((t - stateStartT) / 1.4, 1.0));
      idleTgt.rz =  p * 0.13; idleTgt.ry = -p * 0.06; idleTgt.rx = -p * 0.05;
      if (sinceMove > 6.5) { idleState = 'idle'; stateStartT = t; }
      break;
    }
    case 'idle':
      idleTgt.ry = Math.sin(t * 0.13) * 0.05;
      idleTgt.rx = Math.sin(t * 0.09) * 0.02;
      idleTgt.rz = 0.06 + Math.sin(t * 0.11) * 0.02;
      if (t - stateStartT > 7.0) {
        motionType = Math.random() < 0.5 ? 0 : 1;
        idleState = 'motion'; stateStartT = t;
      }
      break;
    case 'motion': {
      const p = t - stateStartT;
      if (motionType === 0) {
        if      (p < 0.10) idleTgt.ry = -0.50 * (p / 0.10);
        else if (p < 0.40) idleTgt.ry = -0.50 * (1 - (p - 0.10) / 0.30);
        else               { idleTgt.ry = 0; idleState = 'idle'; stateStartT = t; }
      } else {
        if (p < 4.5) {
          idleTgt.ry = Math.sin(p * 0.55) * 0.30;
          idleTgt.rz = 0.06 + Math.sin(p * 0.45 + 0.5) * 0.07;
        } else {
          idleTgt.ry = 0; idleTgt.rz = 0.06;
          idleState = 'idle'; stateStartT = t;
        }
      }
      break;
    }
  }
}

// ─── frameModel ──────────────────────────────────────────
function frameModel(obj) {
  const box    = new THREE.Box3().setFromObject(obj);
  const size   = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  obj.position.x -= center.x; obj.position.y -= center.y; obj.position.z -= center.z;
  const targetHeight = IS_MOBILE ? 3.15 : 3.55;
  obj.scale.setScalar(targetHeight / Math.max(size.y, 0.0001));
  const box2    = new THREE.Box3().setFromObject(obj);
  const center2 = box2.getCenter(new THREE.Vector3());
  const size2   = box2.getSize(new THREE.Vector3());
  obj.position.x -= center2.x; obj.position.y -= center2.y; obj.position.z -= center2.z;
  obj.position.y = size2.y * 0.05;
}

// ─── Load model ──────────────────────────────────────────
new GLTFLoader().load('./model.glb', (gltf) => {
  const model = gltf.scene;
  scene.add(model);
  model.traverse((obj) => {
    if (!obj.isBone) return;
    const n = obj.name;
    if (n === 'Head') headBone = obj;
    if (n === 'Neck') neckBone = obj;
  });
  frameModel(model);
  buildWireOverlay(model);
});

// ─── Noise ───────────────────────────────────────────────
const noise = (t, f, p) =>
  Math.sin(t * f + p) * 0.5 +
  Math.sin(t * f * 1.618 + p * 1.3) * 0.3 +
  Math.sin(t * f * 2.414 + p * 0.7) * 0.2;

// ─── Animate ─────────────────────────────────────────────
let prevT    = -1;
let rafId    = null;

function animate() {
  rafId = requestAnimationFrame(animate);
  const t  = clock.getElapsedTime();
  const dt = prevT < 0 ? 0 : Math.min(t - prevT, 0.05);
  prevT = t;

  // ── hoverProg更新 ──────────────────────────────────
  const over = isHoveringModel();
  if (over) {
    if (hoverStartTime === null) hoverStartTime = t;
    const dwelt = (t - hoverStartTime) >= HOVER_DWELL;
    hoverProg = dwelt
      ? Math.min(1, hoverProg + HOVER_IN * dt)
      : Math.max(0, hoverProg - HOVER_OUT * 0.3 * dt);
  } else {
    hoverStartTime = null;
    hoverProg = Math.max(0, hoverProg - HOVER_OUT * dt);
  }

  // ── ラベル表示更新 ─────────────────────────────────
  labelEl.style.opacity = hoverProg;
  labelEl.style.pointerEvents = hoverProg > 0.5 ? 'auto' : 'none';

  const hoverActive = hoverProg > 0.6;
  if (hoverActive && !hoverWasActive) startTypewriter();
  if (!hoverActive && hoverWasActive) resetLabel();
  hoverWasActive = hoverActive;

  updateIdle(t);
  updateCycle();

  const tr = idleState === 'track' ? 1.0 : 0.0;
  const tgtRy = mouse.x  * 0.50 * tr + idleTgt.ry;
  const tgtRx = -mouse.y * 0.28 * tr + idleTgt.rx + 0.25;
  const tgtRz = idleTgt.rz;

  vel.ry = vel.ry * DAMPING + (tgtRy - cur.ry) * SPRING;
  vel.rx = vel.rx * DAMPING + (tgtRx - cur.rx) * SPRING;
  vel.rz = vel.rz * DAMPING + (tgtRz - cur.rz) * SPRING;
  cur.ry += vel.ry; cur.rx += vel.rx; cur.rz += vel.rz;

  const breath = Math.sin(t * 1.31) * 0.65 + Math.sin(t * 0.655) * 0.35;

  if (headBone) {
    headBone.rotation.y = cur.ry + noise(t, 0.22, 0.0) * 0.012;
    headBone.rotation.x = cur.rx + noise(t, 0.28, 1.1) * 0.009;
    headBone.rotation.z = cur.rz + noise(t, 0.18, 2.3) * 0.009;
  }
  if (neckBone) {
    neckBone.rotation.y = cur.ry * 0.30 + noise(t, 0.22, 0.0) * 0.005;
    neckBone.rotation.x = cur.rx * 0.20 + noise(t, 0.28, 1.1) * 0.004;
    neckBone.rotation.z = cur.rz * 0.20 + noise(t, 0.18, 2.3) * 0.004;
  }

  const hbPhase = (t % 0.923) / 0.923;
  const lub = Math.exp(-Math.pow(hbPhase - 0.05, 2) / 0.0015);
  const dub = Math.exp(-Math.pow(hbPhase - 0.22, 2) / 0.0025) * 0.55;
  const hb  = (lub + dub) * 0.27;

  camera.position.y = 1.2 + breath * 0.010;
  camera.position.z = 9.0 - hb;
  camera.lookAt(0, 0.2, 0);

  renderer.render(scene, camera);
}

animate();

// ─── Page Visibility（タブ非表示時に描画停止）────────────
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
  } else {
    if (rafId === null) animate();
  }
});

// ─── Resize ──────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
