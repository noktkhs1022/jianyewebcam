<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    canvas { display: block; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const IS_MOBILE = window.innerWidth < 768;

// ─── Renderer ───────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ─── Scene ──────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xcccccc); // 診断用グレー背景

// 診断用キューブ（モデルが出なくても確認できる）
const testCube = new THREE.Mesh(
  new THREE.BoxGeometry(1, 1, 1),
  new THREE.MeshStandardMaterial({ color: 0xff0000 })
);
scene.add(testCube);

// ─── Camera（main.jsと同じ値）───────────────────────────
const camera = new THREE.PerspectiveCamera(32, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0.9, 5.8);

// ─── Lighting（main.jsと同じ値）─────────────────────────
const ambientLight = new THREE.AmbientLight(0xffffff, 1.35);
scene.add(ambientLight);
const keyLight = new THREE.DirectionalLight(0xffffff, 1.55);
keyLight.position.set(2.8, 3.0, 4.0);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xffffff, 0.75);
fillLight.position.set(-2.0, 1.5, 2.8);
scene.add(fillLight);

// ─── Bone refs ──────────────────────────────────────────
let headBone = null, neckBone = null, spineBone = null;
let shoulderL = null, shoulderR = null;
let idleBaseY = 0;

// ─── Input ──────────────────────────────────────────────
const mouse   = { x: 0, y: 0 };
const current = { rx: 0, ry: 0 };

window.addEventListener('mousemove', (e) => {
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -((e.clientY / window.innerHeight) * 2 - 1);
});
window.addEventListener('touchmove', (e) => {
  const t = e.touches[0];
  mouse.x =  (t.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -((t.clientY / window.innerHeight) * 2 - 1);
}, { passive: true });

// ─── frameModel（main.jsと完全に同じ）──────────────────
function frameModel(obj) {
  const box = new THREE.Box3().setFromObject(obj);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  obj.position.x -= center.x;
  obj.position.y -= center.y;
  obj.position.z -= center.z;
  const targetHeight = IS_MOBILE ? 3.15 : 3.55;
  obj.scale.setScalar(targetHeight / Math.max(size.y, 0.0001));
  const box2 = new THREE.Box3().setFromObject(obj);
  const center2 = box2.getCenter(new THREE.Vector3());
  const size2 = box2.getSize(new THREE.Vector3());
  obj.position.x -= center2.x;
  obj.position.y -= center2.y;
  obj.position.z -= center2.z;
  obj.position.y = -size2.y * 0.18;
  idleBaseY = obj.position.y;
}

// ─── Load model ─────────────────────────────────────────
const loader = new GLTFLoader();
loader.load('./model.glb', (gltf) => {
  const model = gltf.scene;
  scene.add(model);

  model.traverse((obj) => {
    if (!obj.isBone) return;
    const n = obj.name;
    if (n === 'Head')       headBone  = obj;
    if (n === 'Neck')       neckBone  = obj;
    if (n === 'Spine')      spineBone = obj;
    if (n === 'Shoulder-L') shoulderL = obj;
    if (n === 'Shoulder-R') shoulderR = obj;
  });

  frameModel(model);
});

// ─── Noise ──────────────────────────────────────────────
function multiNoise(t, freq, phase) {
  return (
    Math.sin(t * freq         + phase) * 0.50 +
    Math.sin(t * freq * 1.618 + phase * 1.3) * 0.30 +
    Math.sin(t * freq * 2.414 + phase * 0.7) * 0.20
  );
}

// ─── Animate ────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // マウス/タッチ追従
  const LERP = 0.035;
  current.ry += (mouse.x * 0.30 - current.ry) * LERP;
  current.rx += (mouse.y * 0.12 - current.rx) * LERP;

  // 呼吸（周期~4.8秒）
  const breath = Math.sin(t * 1.31) * 0.65 + Math.sin(t * 0.655) * 0.35;

  if (headBone) {
    headBone.rotation.y = current.ry + multiNoise(t, 0.28, 0.0) * 0.012;
    headBone.rotation.x = current.rx + multiNoise(t, 0.35, 1.1) * 0.007;
    headBone.rotation.z =              multiNoise(t, 0.22, 2.3) * 0.010;
  }
  if (neckBone) {
    neckBone.rotation.y = current.ry * 0.40 + multiNoise(t, 0.28, 0.0) * 0.005;
    neckBone.rotation.x = current.rx * 0.30;
  }
  if (spineBone) {
    spineBone.position.y = breath * 0.005;
    spineBone.rotation.x = breath * 0.006;
    spineBone.rotation.z = multiNoise(t, 0.18, 3.5) * 0.007;
  }
  if (shoulderL) shoulderL.rotation.z =  breath * 0.018;
  if (shoulderR) shoulderR.rotation.z = -breath * 0.018;

  renderer.render(scene, camera);
}

animate();

// ─── Resize ─────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
