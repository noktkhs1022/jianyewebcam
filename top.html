<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    canvas { display: block; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const IS_MOBILE = window.innerWidth < 768;
const clock = new THREE.Clock();

// ─── Renderer ────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ─── Scene / Camera ──────────────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.2, 8.0);
camera.lookAt(0, 0.5, 0);

// ─── Lighting ────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 1.35));
const keyLight = new THREE.DirectionalLight(0xffffff, 1.55);
keyLight.position.set(2.8, 3.0, 4.0);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xffffff, 0.75);
fillLight.position.set(-2.0, 1.5, 2.8);
scene.add(fillLight);

// ─── Bones ───────────────────────────────────────────────
let headBone = null, neckBone = null;

// ─── Spring-damper ───────────────────────────────────────
const cur = { ry: 0, rx: 0, rz: 0 };
const vel = { ry: 0, rx: 0, rz: 0 };
const SPRING  = 0.055;
const DAMPING = 0.82;

// ─── Input ───────────────────────────────────────────────
const mouse = { x: 0, y: 0 };
let lastMoveTime = -999;

window.addEventListener('mousemove', (e) => {
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -((e.clientY / window.innerHeight) * 2 - 1);
  lastMoveTime = clock.getElapsedTime();
});
window.addEventListener('touchmove', (e) => {
  const t = e.touches[0];
  mouse.x =  (t.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -((t.clientY / window.innerHeight) * 2 - 1);
  lastMoveTime = clock.getElapsedTime();
}, { passive: true });

// ─── Idle state machine ──────────────────────────────────
// track → curious (2.5s) → idle (6s) → motion → idle → ...
let idleState    = 'track';
let stateStartT  = 0;
let motionType   = 0; // 0=首を鳴らす  1=ゆっくり首振り
const idleTgt    = { ry: 0, rx: 0, rz: 0 };

function easeInOut(p) {
  return p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
}

function updateIdle(t) {
  const sinceMove = t - lastMoveTime;

  // カーソルが動いたら即トラッキングに戻る
  if (sinceMove < 0.4 && idleState !== 'track') {
    idleState   = 'track';
    stateStartT = t;
    idleTgt.ry = idleTgt.rx = idleTgt.rz = 0;
    return;
  }

  switch (idleState) {

    case 'track':
      idleTgt.ry = idleTgt.rx = idleTgt.rz = 0;
      if (sinceMove > 2.5) { idleState = 'curious'; stateStartT = t; }
      break;

    case 'curious': {
      // 首を少し傾けて不思議そうに
      const p = easeInOut(Math.min((t - stateStartT) / 1.4, 1.0));
      idleTgt.rz =  p * 0.13;
      idleTgt.ry = -p * 0.06;
      idleTgt.rx = -p * 0.05;
      if (sinceMove > 6.5) { idleState = 'idle'; stateStartT = t; }
      break;
    }

    case 'idle':
      // ゆったりした揺れ
      idleTgt.ry = Math.sin(t * 0.13) * 0.05;
      idleTgt.rx = Math.sin(t * 0.09) * 0.02;
      idleTgt.rz = 0.06 + Math.sin(t * 0.11) * 0.02;
      if (t - stateStartT > 7.0) {
        motionType  = Math.random() < 0.5 ? 0 : 1;
        idleState   = 'motion';
        stateStartT = t;
      }
      break;

    case 'motion': {
      const p = t - stateStartT;
      if (motionType === 0) {
        // 首を鳴らす：素早く一方向へ→戻る
        if      (p < 0.10) idleTgt.ry = -0.50 * (p / 0.10);
        else if (p < 0.40) idleTgt.ry = -0.50 * (1 - (p - 0.10) / 0.30);
        else               { idleTgt.ry = 0; idleState = 'idle'; stateStartT = t; }
      } else {
        // ゆっくり首を回して休む
        if (p < 4.5) {
          idleTgt.ry = Math.sin(p * 0.55) * 0.30;
          idleTgt.rz = 0.06 + Math.sin(p * 0.45 + 0.5) * 0.07;
        } else {
          idleTgt.ry = 0; idleTgt.rz = 0.06;
          idleState = 'idle'; stateStartT = t;
        }
      }
      break;
    }
  }
}

// ─── frameModel（main.jsと同じ、サイズだけ小さく）────────
function frameModel(obj) {
  const box    = new THREE.Box3().setFromObject(obj);
  const size   = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  obj.position.x -= center.x;
  obj.position.y -= center.y;
  obj.position.z -= center.z;
  const targetHeight = IS_MOBILE ? 3.15 : 3.55;
  obj.scale.setScalar(targetHeight / Math.max(size.y, 0.0001));
  const box2   = new THREE.Box3().setFromObject(obj);
  const center2 = box2.getCenter(new THREE.Vector3());
  const size2  = box2.getSize(new THREE.Vector3());
  obj.position.x -= center2.x;
  obj.position.y -= center2.y;
  obj.position.z -= center2.z;
  obj.position.y = -size2.y * 0.18;
}

// ─── Load model ──────────────────────────────────────────
new GLTFLoader().load('./model.glb', (gltf) => {
  const model = gltf.scene;
  scene.add(model);
  model.traverse((obj) => {
    if (!obj.isBone) return;
    const n = obj.name;
    if (n === 'Head') headBone = obj;
    if (n === 'Neck') neckBone = obj;
  });
  frameModel(model);
});

// ─── Noise ───────────────────────────────────────────────
const noise = (t, f, p) =>
  Math.sin(t * f + p) * 0.5 +
  Math.sin(t * f * 1.618 + p * 1.3) * 0.3 +
  Math.sin(t * f * 2.414 + p * 0.7) * 0.2;

// ─── Animate ─────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  updateIdle(t);

  // トラッキング量（アイドル中はゼロへ収束）
  const tr = idleState === 'track' ? 1.0 : 0.0;
  const tgtRy = mouse.x * 0.50 * tr + idleTgt.ry;
  const tgtRx = mouse.y * 0.28 * tr + idleTgt.rx;
  const tgtRz = idleTgt.rz;

  // Spring-damper
  vel.ry = vel.ry * DAMPING + (tgtRy - cur.ry) * SPRING;
  vel.rx = vel.rx * DAMPING + (tgtRx - cur.rx) * SPRING;
  vel.rz = vel.rz * DAMPING + (tgtRz - cur.rz) * SPRING;
  cur.ry += vel.ry;
  cur.rx += vel.rx;
  cur.rz += vel.rz;

  // 呼吸サイクル（~4.8秒）
  const breath = Math.sin(t * 1.31) * 0.65 + Math.sin(t * 0.655) * 0.35;

  // Head
  if (headBone) {
    headBone.rotation.y = cur.ry + noise(t, 0.18, 0) * 0.004;
    headBone.rotation.x = cur.rx + noise(t, 0.22, 1) * 0.003;
    headBone.rotation.z = cur.rz + noise(t, 0.16, 2) * 0.003;
  }
  // Neck（30%追従）
  if (neckBone) {
    neckBone.rotation.y = cur.ry * 0.30;
    neckBone.rotation.x = cur.rx * 0.20;
    neckBone.rotation.z = cur.rz * 0.20;
  }
  // カメラ呼吸
  camera.position.y = 1.0 + breath * 0.010;

  renderer.render(scene, camera);
}

animate();

// ─── Resize ──────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
