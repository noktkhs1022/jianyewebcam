<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    canvas { display: block; }
    #rain {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<canvas id="rain"></canvas>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const IS_MOBILE = window.innerWidth < 768;
const clock = new THREE.Clock();

// ─── Renderer ────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;
// Three.jsのwidth/height styleを残しつつz-indexのみ追加
renderer.domElement.style.position = 'fixed';
renderer.domElement.style.top = '0';
renderer.domElement.style.left = '0';
renderer.domElement.style.zIndex = '3';
renderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(renderer.domElement);

// ─── Scene / Camera ──────────────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.2, 9.0);
camera.lookAt(0, 0.2, 0);

// ─── Lighting ────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 1.35));
const keyLight = new THREE.DirectionalLight(0xffffff, 1.55);
keyLight.position.set(2.8, 3.0, 4.0);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xffffff, 0.75);
fillLight.position.set(-2.0, 1.5, 2.8);
scene.add(fillLight);

// ─── Bones ───────────────────────────────────────────────
let headBone = null, neckBone = null;

// ─── Wire overlay ────────────────────────────────────────
const texMeshes  = []; // { mesh, mats[] }
const wireMeshes = []; // THREE.SkinnedMesh (wireframe)

function buildWireOverlay(model) {
  model.traverse((obj) => {
    if (!obj.isSkinnedMesh) return;
    const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
    mats.forEach(m => { m.transparent = true; m.opacity = 1; });
    texMeshes.push({ mesh: obj, mats });

    const wireMat = new THREE.MeshBasicMaterial({
      color: 0x333333,
      wireframe: true,
      transparent: true,
      opacity: 0
    });
    const wm = new THREE.SkinnedMesh(obj.geometry, wireMat);
    wm.bind(obj.skeleton, obj.bindMatrix);
    wm.position.copy(obj.position);
    wm.rotation.copy(obj.rotation);
    wm.scale.copy(obj.scale);
    obj.parent.add(wm);
    wireMeshes.push(wm);
  });
}

// ─── Texture↔Wire cycle ──────────────────────────────────
// tex(15s) → fadeToWire(1.5s) → wire(5s) → fadeToTex(1.5s) → ...
const FADE_DUR  = 1.5;
const TEX_DUR   = 15;
const WIRE_DUR  = 5;
let   cycleState = 'tex';
let   cycleStart = 0;

function updateCycle(t) {
  if (texMeshes.length === 0) return;

  // ホバー中はワイヤーフレームを優先
  if (hoverProg > 0.001) {
    const wireA = Math.min(1, hoverProg * 2.5);
    const texA  = 1 - wireA;
    texMeshes.forEach(({ mats }) => mats.forEach(m => { m.opacity = texA; }));
    wireMeshes.forEach(wm => { wm.material.opacity = wireA; });
    cycleState = 'tex'; cycleStart = t; // ホバー終了後はtexから再開
    return;
  }

  const p = t - cycleStart;
  let texA = 1, wireA = 0;

  switch (cycleState) {
    case 'tex':
      texA = 1; wireA = 0;
      if (p >= TEX_DUR) { cycleState = 'fadeToWire'; cycleStart = t; }
      break;
    case 'fadeToWire': {
      const r = easeInOut(Math.min(p / FADE_DUR, 1));
      texA = 1 - r; wireA = r;
      if (p >= FADE_DUR) { cycleState = 'wire'; cycleStart = t; }
      break;
    }
    case 'wire':
      texA = 0; wireA = 1;
      if (p >= WIRE_DUR) { cycleState = 'fadeToTex'; cycleStart = t; }
      break;
    case 'fadeToTex': {
      const r = easeInOut(Math.min(p / FADE_DUR, 1));
      texA = r; wireA = 1 - r;
      if (p >= FADE_DUR) { cycleState = 'tex'; cycleStart = t; }
      break;
    }
  }
  texMeshes.forEach(({ mats }) => mats.forEach(m => { m.opacity = texA; }));
  wireMeshes.forEach(wm => { wm.material.opacity = wireA; });
}

// ─── Spring-damper ───────────────────────────────────────
const cur = { ry: 0, rx: 0, rz: 0 };
const vel = { ry: 0, rx: 0, rz: 0 };
const SPRING  = 0.055;
const DAMPING = 0.82;

// ─── Input ───────────────────────────────────────────────
const mouse = { x: 0, y: 0 };
let lastMoveTime = -999;
let mouseMoved = false;

window.addEventListener('mousemove', (e) => {
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -((e.clientY / window.innerHeight) * 2 - 1);
  lastMoveTime = clock.getElapsedTime();
  mouseMoved = true;
});
window.addEventListener('touchmove', (e) => {
  const t = e.touches[0];
  mouse.x =  (t.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -((t.clientY / window.innerHeight) * 2 - 1);
  lastMoveTime = clock.getElapsedTime();
  mouseMoved = true;
}, { passive: true });

// ─── postMessage（Wix埋め込み時）────────────────────────
window.addEventListener('message', (e) => {
  const d = e.data;
  if (d && typeof d.mx === 'number' && typeof d.my === 'number') {
    mouse.x = d.mx;
    mouse.y = d.my;
    lastMoveTime = clock.getElapsedTime();
    mouseMoved = true;
  }
});

// ─── Idle state machine ──────────────────────────────────
// track → curious (2.5s) → idle (6s) → motion → idle → ...
let idleState    = 'track';
let stateStartT  = 0;
let motionType   = 0; // 0=首を鳴らす  1=ゆっくり首振り
const idleTgt    = { ry: 0, rx: 0, rz: 0 };

function easeInOut(p) {
  return p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
}

function updateIdle(t) {
  const sinceMove = t - lastMoveTime;

  // カーソルが動いたら即トラッキングに戻る
  if (sinceMove < 0.4 && idleState !== 'track') {
    idleState   = 'track';
    stateStartT = t;
    idleTgt.ry = idleTgt.rx = idleTgt.rz = 0;
    return;
  }

  switch (idleState) {

    case 'track':
      idleTgt.ry = idleTgt.rx = idleTgt.rz = 0;
      if (sinceMove > 2.5) { idleState = 'curious'; stateStartT = t; }
      break;

    case 'curious': {
      // 首を少し傾けて不思議そうに
      const p = easeInOut(Math.min((t - stateStartT) / 1.4, 1.0));
      idleTgt.rz =  p * 0.13;
      idleTgt.ry = -p * 0.06;
      idleTgt.rx = -p * 0.05;
      if (sinceMove > 6.5) { idleState = 'idle'; stateStartT = t; }
      break;
    }

    case 'idle':
      // ゆったりした揺れ
      idleTgt.ry = Math.sin(t * 0.13) * 0.05;
      idleTgt.rx = Math.sin(t * 0.09) * 0.02;
      idleTgt.rz = 0.06 + Math.sin(t * 0.11) * 0.02;
      if (t - stateStartT > 7.0) {
        motionType  = Math.random() < 0.5 ? 0 : 1;
        idleState   = 'motion';
        stateStartT = t;
      }
      break;

    case 'motion': {
      const p = t - stateStartT;
      if (motionType === 0) {
        // 首を鳴らす：素早く一方向へ→戻る
        if      (p < 0.10) idleTgt.ry = -0.50 * (p / 0.10);
        else if (p < 0.40) idleTgt.ry = -0.50 * (1 - (p - 0.10) / 0.30);
        else               { idleTgt.ry = 0; idleState = 'idle'; stateStartT = t; }
      } else {
        // ゆっくり首を回して休む
        if (p < 4.5) {
          idleTgt.ry = Math.sin(p * 0.55) * 0.30;
          idleTgt.rz = 0.06 + Math.sin(p * 0.45 + 0.5) * 0.07;
        } else {
          idleTgt.ry = 0; idleTgt.rz = 0.06;
          idleState = 'idle'; stateStartT = t;
        }
      }
      break;
    }
  }
}

// ─── frameModel（main.jsと同じ、サイズだけ小さく）────────
function frameModel(obj) {
  const box    = new THREE.Box3().setFromObject(obj);
  const size   = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  obj.position.x -= center.x;
  obj.position.y -= center.y;
  obj.position.z -= center.z;
  const targetHeight = IS_MOBILE ? 3.15 : 3.55;
  obj.scale.setScalar(targetHeight / Math.max(size.y, 0.0001));
  const box2   = new THREE.Box3().setFromObject(obj);
  const center2 = box2.getCenter(new THREE.Vector3());
  const size2  = box2.getSize(new THREE.Vector3());
  obj.position.x -= center2.x;
  obj.position.y -= center2.y;
  obj.position.z -= center2.z;
  obj.position.y = size2.y * 0.05;
}

// ─── Load model ──────────────────────────────────────────
new GLTFLoader().load('./model.glb', (gltf) => {
  const model = gltf.scene;
  scene.add(model);
  model.traverse((obj) => {
    if (!obj.isBone) return;
    const n = obj.name;
    if (n === 'Head') headBone = obj;
    if (n === 'Neck') neckBone = obj;
  });
  frameModel(model);
  buildWireOverlay(model);
  cycleStart = clock.getElapsedTime();
});

// ─── Rain system ─────────────────────────────────────────
const rainCanvas   = document.getElementById('rain');
const rainCtx      = rainCanvas.getContext('2d');
const FX_SET       = ' .:-=+*#%@';
const CHAR_SIZE    = IS_MOBILE ? 11 : 8;
const LOGO_W_RATIO = IS_MOBILE ? 0.55 : 0.38;

let hoverProg      = 0;
let hoverStartTime = null;   // モデル上に入った瞬間の時刻
const HOVER_DWELL  = 0.4;    // 0.4秒以上ホバーしてから発動
const HOVER_IN     = 1.5;  // /秒
const HOVER_OUT    = 0.7;  // /秒

// ── モデルホバー判定（スクリーン座標）────────────────
// NDC座標（-1〜+1）でモデルの表示領域を定義
// 画面中央付近の矩形：調整が必要な場合は数値を変更
const MODEL_NDC = { xMin: -0.28, xMax: 0.28, yMin: -0.42, yMax: 0.52 };

function isHoveringModel() {
  if (!mouseMoved) return false;
  return mouse.x > MODEL_NDC.xMin && mouse.x < MODEL_NDC.xMax
      && mouse.y > MODEL_NDC.yMin && mouse.y < MODEL_NDC.yMax;
}

// ── ロゴマスク ─────────────────────────────────────────
const logoImg = new Image();
let   logoReady = false;
let   logoDrawRect = null; // destination-out用の描画範囲

function buildLogoMask() {
  const W = rainCanvas.width, H = rainCanvas.height;
  const lw = W * LOGO_W_RATIO;
  const lh = lw * (logoImg.naturalHeight / logoImg.naturalWidth);
  const lx = (W - lw) / 2;
  const ly = H * 0.5 - lh * 0.5;
  logoDrawRect = { lx, ly, lw, lh };
}

logoImg.onload = () => { logoReady = true; buildLogoMask(); };
logoImg.src = './jianye-logo-web-bg.png';

// ── カラム（1文字ずつ上から下へ、逆再生フェードアウト）──
function fxChar(b) {
  return FX_SET[Math.min(FX_SET.length - 1, Math.floor(b * FX_SET.length))];
}

// ランダムな長さのランとギャップで1列分の文字配列を生成
function generateChars(H) {
  const numRows = Math.ceil(H / CHAR_SIZE) + 25;
  const chars = [];
  let r = 0;
  while (r < numRows) {
    const runLen = 4 + Math.floor(Math.random() * 14);
    for (let i = 0; i < runLen; i++, r++) {
      chars.push(fxChar(1 - i / runLen)); // 先頭明るい、末尾暗い
    }
    const gapLen = 3 + Math.floor(Math.random() * 10);
    for (let i = 0; i < gapLen; i++, r++) {
      chars.push(null); // 空白行
    }
  }
  return chars;
}

function makeCol(H) {
  return {
    front: -(1 + Math.random() * 22), // 負の値＝開始ディレイ（行単位）
    speed: 6 + Math.random() * 9,     // 行/秒
    chars: generateChars(H),
  };
}

let cols = [];
let prevRainT = -1;

function initCols() {
  const W = rainCanvas.width, H = rainCanvas.height;
  const n = Math.ceil(W / CHAR_SIZE);
  cols = Array.from({ length: n }, () => makeCol(H));
}

function resizeRain() {
  rainCanvas.width  = window.innerWidth;
  rainCanvas.height = window.innerHeight;
  if (logoReady) buildLogoMask();
  initCols();
}
resizeRain();

// ── 雨描画 ───────────────────────────────────────────
function updateRain() {
  const now = clock.getElapsedTime();
  const dt  = prevRainT < 0 ? 0 : Math.min(now - prevRainT, 0.05);
  prevRainT = now;

  // ── hoverProgの更新 ──────────────────────────────
  const over = isHoveringModel();
  if (over) {
    if (hoverStartTime === null) hoverStartTime = now;
    const dwelt = (now - hoverStartTime) >= HOVER_DWELL;
    hoverProg = dwelt
      ? Math.min(1, hoverProg + HOVER_IN * dt)
      : Math.max(0, hoverProg - HOVER_OUT * 0.3 * dt);
  } else {
    hoverStartTime = null;
    hoverProg = Math.max(0, hoverProg - HOVER_OUT * dt);
  }

  const W = rainCanvas.width, H = rainCanvas.height;
  rainCtx.clearRect(0, 0, W, H);
  if (hoverProg <= 0.001) return;

  // ── フェーズ制御 ─────────────────────────────────
  // Phase 1 (hoverProg 0→0.35): グリッチ散乱、背景まだ白
  // Phase 2 (hoverProg 0.25→0.75): 背景じわじわ暗転
  // Phase 3 (hoverProg 0.5→1.0): ASCII密度上昇、ロゴ浮上
  const bgProg    = Math.max(0, Math.min(1, (hoverProg - 0.25) / 0.75));
  const glitchAmt = Math.max(0, 1 - hoverProg * 1.8); // 序盤に最大、後半消える
  const denseProg = Math.max(0, Math.min(1, (hoverProg - 0.3) / 0.7));

  // 背景暗化（フェーズ2から）
  if (bgProg > 0) {
    rainCtx.fillStyle = `rgba(0,0,0,${bgProg * 0.80})`;
    rainCtx.fillRect(0, 0, W, H);
  }

  // 文字色（背景暗転に合わせてチャコール→ライトグレー）
  const cv = Math.round(51 + 160 * bgProg);

  rainCtx.font = `${CHAR_SIZE}px monospace`;

  const numCols = Math.ceil(W / CHAR_SIZE);
  if (cols.length !== numCols) initCols();

  // ── Phase1: 散乱グリッチ文字（序盤のみ）─────────
  if (glitchAmt > 0.05) {
    const gCount = Math.floor(glitchAmt * 55 * (W / 1440));
    for (let i = 0; i < gCount; i++) {
      const gx = Math.floor(Math.random() * numCols) * CHAR_SIZE;
      const gy = Math.floor(Math.random() * Math.ceil(H / CHAR_SIZE)) * CHAR_SIZE + CHAR_SIZE;
      const ga = glitchAmt * (0.4 + Math.random() * 0.6) * hoverProg;
      rainCtx.fillStyle = `rgba(${cv},${cv},${cv},${ga})`;
      rainCtx.fillText(fxChar(Math.random()), gx, gy);
    }
  }

  // ── Phase3: カラム更新と描画 ─────────────────────
  if (denseProg > 0) {
    for (let c = 0; c < numCols; c++) {
      const col = cols[c];
      if (over) {
        col.front += col.speed * dt;
        if (col.front >= col.chars.length) {
          cols[c] = makeCol(H);
          cols[c].front = -(1 + Math.random() * 18);
        }
      } else {
        col.front -= col.speed * 2.0 * dt;
      }
    }

    for (let c = 0; c < numCols; c++) {
      const col   = cols[c];
      const front = Math.floor(col.front);
      if (front <= 0) continue;

      // 列ごとにグリッチxオフセット（序盤のみ）
      const xOff = glitchAmt > 0.1 && Math.random() < glitchAmt * 0.12
        ? (Math.random() - 0.5) * CHAR_SIZE * 3.5 : 0;

      const limit = Math.min(front, col.chars.length);
      for (let row = 0; row < limit; row++) {
        const ch = col.chars[row];
        if (ch === null) continue;
        const cy = row * CHAR_SIZE + CHAR_SIZE;
        if (cy > H) break;

        const fromFront = front - 1 - row;
        const fade  = Math.max(0.25, 1 - fromFront / 28.0);
        const alpha = Math.min(1, fade * denseProg);
        rainCtx.fillStyle = `rgba(${cv},${cv},${cv},${alpha})`;
        rainCtx.fillText(ch, c * CHAR_SIZE + xOff, cy);
      }
    }
  }

  // ── ロゴをdestination-outで「穴あけ」────────────
  // ロゴ形状の部分だけcanvasを透明に→背景色がロゴ形状として浮かび上がる
  if (logoReady && logoDrawRect && bgProg > 0.05) {
    const { lx, ly, lw, lh } = logoDrawRect;
    rainCtx.globalCompositeOperation = 'destination-out';
    rainCtx.globalAlpha = Math.min(1, bgProg * 1.2);
    rainCtx.drawImage(logoImg, lx, ly, lw, lh);
    rainCtx.globalAlpha = 1;
    rainCtx.globalCompositeOperation = 'source-over';
  }
}

// ── クリックでCAPTUREページへ ──────────────────────────
const CAPTURE_URL = 'https://www.jianye.online/capture';
window.addEventListener('click', () => {
  if (hoverProg > 0.3) window.top.location.href = CAPTURE_URL;
});

// ─── Noise ───────────────────────────────────────────────
const noise = (t, f, p) =>
  Math.sin(t * f + p) * 0.5 +
  Math.sin(t * f * 1.618 + p * 1.3) * 0.3 +
  Math.sin(t * f * 2.414 + p * 0.7) * 0.2;

// ─── Animate ─────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  updateIdle(t);
  updateCycle(t);
  updateRain();

  // トラッキング量（アイドル中はゼロへ収束）
  const tr = idleState === 'track' ? 1.0 : 0.0;
  const tgtRy = mouse.x  * 0.50 * tr + idleTgt.ry;
  const tgtRx = -mouse.y * 0.28 * tr + idleTgt.rx + 0.25;
  const tgtRz = idleTgt.rz;

  // Spring-damper
  vel.ry = vel.ry * DAMPING + (tgtRy - cur.ry) * SPRING;
  vel.rx = vel.rx * DAMPING + (tgtRx - cur.rx) * SPRING;
  vel.rz = vel.rz * DAMPING + (tgtRz - cur.rz) * SPRING;
  cur.ry += vel.ry;
  cur.rx += vel.rx;
  cur.rz += vel.rz;

  // 呼吸サイクル（~4.8秒）
  const breath = Math.sin(t * 1.31) * 0.65 + Math.sin(t * 0.655) * 0.35;

  // Head（常時微動 + 追従）
  if (headBone) {
    headBone.rotation.y = cur.ry + noise(t, 0.22, 0.0) * 0.012;
    headBone.rotation.x = cur.rx + noise(t, 0.28, 1.1) * 0.009;
    headBone.rotation.z = cur.rz + noise(t, 0.18, 2.3) * 0.009;
  }
  // Neck（30%追従 + 微動）
  if (neckBone) {
    neckBone.rotation.y = cur.ry * 0.30 + noise(t, 0.22, 0.0) * 0.005;
    neckBone.rotation.x = cur.rx * 0.20 + noise(t, 0.28, 1.1) * 0.004;
    neckBone.rotation.z = cur.rz * 0.20 + noise(t, 0.18, 2.3) * 0.004;
  }
  // 心拍（lub-dub、65BPM）
  const hbPhase = (t % 0.923) / 0.923;
  const lub = Math.exp(-Math.pow(hbPhase - 0.05, 2) / 0.0015);
  const dub = Math.exp(-Math.pow(hbPhase - 0.22, 2) / 0.0025) * 0.55;
  const hb  = (lub + dub) * 0.27; // 3% of z=9.0

  // カメラ（呼吸 + 心拍）
  camera.position.y = 1.2 + breath * 0.010;
  camera.position.z = 9.0 - hb;
  camera.lookAt(0, 0.2, 0);

  renderer.render(scene, camera);
}

animate();

// ─── Resize ──────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  resizeRain();
});
</script>
</body>
</html>
