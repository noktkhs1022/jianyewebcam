<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    .ticker-wrap {
      width: 100%;
      overflow: hidden;
      padding: 6px 0;
    }

    .ticker-track {
      display: flex;
      white-space: nowrap;
      animation: ticker-scroll 28s linear infinite;
    }

    .ticker-content {
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
    }

    .ticker-text {
      font-family: 'VT323', monospace;
      font-size: 22px;
      line-height: 1;
      letter-spacing: 0.06em;
      color: #ff2200;
      text-shadow:
        0 0 3px #ff2200,
        0 0 8px #ff3300,
        0 0 18px #ff1100,
        0 0 36px #cc0000;
      animation: flicker 6s step-end infinite;
      padding: 0 4px;
    }

    .sep {
      font-family: 'VT323', monospace;
      font-size: 18px;
      color: #ff2200;
      text-shadow:
        0 0 3px #ff2200,
        0 0 10px #ff1100;
      opacity: 0.55;
      padding: 0 18px;
      animation: flicker 6s step-end infinite;
    }

    @keyframes ticker-scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    @keyframes flicker {
      0%,  100% { opacity: 1;    }
      91%        { opacity: 1;    }
      92%        { opacity: 0.82; }
      93%        { opacity: 1;    }
      95%        { opacity: 0.88; }
      96%        { opacity: 1;    }
    }

    @media (max-width: 600px) {
      .ticker-text { font-size: 18px; }
      .sep         { font-size: 15px; padding: 0 12px; }
    }

    /* type=all（モバイル）用スタイル上書き */
    body.type-all .ticker-text {
      font-size: 13px;
      color: #404040;
      text-shadow: none;
      animation: none;
    }
    body.type-all .sep {
      font-size: 11px;
      color: #404040;
      text-shadow: none;
      animation: none;
      opacity: 0.4;
      padding: 0 10px;
    }
  </style>
</head>
<body>
  <div class="ticker-wrap">
    <div id="ticker-track" class="ticker-track"></div>
  </div>

  <script>
    // ─── テキスト内容はここだけ編集 ───────────────────────
    const CONTENT = {
      shop: [
        '26.03.31',
        'JIANYE.ONLINE OPEN',
        'ジェンイェ.オンライン オープン',
        '菅野网店开始营业',
      ],
      collection: [
        '26.03.31',
        'SS26 "E.F.S" UPDATE',
        '春夏26 "E.F.S" 更新',
        '已更新 26春夏系列 E.F.S',
      ],
    };
    // ──────────────────────────────────────────────────────

    // allはshop + 全角スペース2個 + collectionを自動結合（モバイル用）
    const GAP = { gap: true };
    CONTENT.all = [
      '[SHOP] ' + CONTENT.shop[0], ...CONTENT.shop.slice(1),
      GAP,
      '[COLLECTION] ' + CONTENT.collection[0], ...CONTENT.collection.slice(1),
      GAP,
    ];

    const type  = new URLSearchParams(location.search).get('type') || 'shop';
    if (type === 'all') document.body.classList.add('type-all');
    const items = CONTENT[type] ?? CONTENT.shop;

    function buildContent() {
      const wrap = document.createElement('div');
      wrap.className = 'ticker-content';
      items.forEach(item => {
        if (item && item.gap) {
          const gap = document.createElement('span');
          gap.className = 'ticker-text';
          gap.textContent = '　　';
          wrap.appendChild(gap);
          return;
        }
        const span = document.createElement('span');
        span.className = 'ticker-text';
        span.textContent = item;
        wrap.appendChild(span);

        const sep = document.createElement('span');
        sep.className = 'sep';
        sep.textContent = '◆';
        wrap.appendChild(sep);
      });
      return wrap;
    }

    const track = document.getElementById('ticker-track');
    track.appendChild(buildContent()); // copy 1
    track.appendChild(buildContent()); // copy 2 — シームレスループ用
  </script>
</body>
</html>
