<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    .ticker-wrap {
      width: 100%;
      overflow: hidden;
      padding: 6px 0;
    }

    .ticker-track {
      display: inline-flex;
      white-space: nowrap;
      will-change: transform;
    }

    .ticker-content {
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
    }

    .ticker-text {
      font-family: 'VT323', 'DotGothic16', monospace;
      font-size: 22px;
      line-height: 1;
      letter-spacing: 0.06em;
      color: #ff2200;
      text-shadow:
        0 0 3px #ff2200,
        0 0 8px #ff3300,
        0 0 18px #ff1100,
        0 0 36px #cc0000;
      animation: flicker 6s step-end infinite;
      padding: 0 20px;
    }

    @keyframes flicker {
      0%,  100% { opacity: 1;    }
      91%        { opacity: 1;    }
      92%        { opacity: 0.82; }
      93%        { opacity: 1;    }
      95%        { opacity: 0.88; }
      96%        { opacity: 1;    }
    }

    .ticker-text.cjk { font-size: 17px; }

    @media (max-width: 600px) {
      .ticker-text     { font-size: 16px; }
      .ticker-text.cjk { font-size: 13px; }
    }

    /* type=all（モバイル）用スタイル上書き */
    body.type-all .ticker-text {
      font-size: 13px;
      color: #404040;
      text-shadow: none;
      animation: none;
    }
  </style>
</head>
<body>
  <div class="ticker-wrap">
    <div id="ticker-track" class="ticker-track"></div>
  </div>

  <script>
    // ─── テキスト内容はここだけ編集 ───────────────────────
    const CONTENT = {
      shop: [
        '26.03.31',
        'JIANYE.ONLINE OPEN',
        'ジェンイェ.オンライン オープン',
        '菅野网店开始营业',
      ],
      collection: [
        '26.03.31',
        'SS26 "E.F.S" UPDATE',
        '春夏26 "E.F.S" 更新',
        '已更新 26春夏系列 E.F.S',
      ],
    };
    // ──────────────────────────────────────────────────────

    const GAP = { gap: true };
    CONTENT.all = [
      '[SHOP] ' + CONTENT.shop[0], ...CONTENT.shop.slice(1),
      GAP,
      '[COLLECTION] ' + CONTENT.collection[0], ...CONTENT.collection.slice(1),
      GAP,
    ];

    const type = new URLSearchParams(location.search).get('type') || 'shop';
    if (type === 'all') document.body.classList.add('type-all');
    const items = CONTENT[type] ?? CONTENT.shop;

    // スクロール速度（px/秒） ── 数値を上げると速くなる
    const PX_PER_SEC = 80;

    function isCJK(text) {
      return /[\u3040-\u9fff\uf900-\ufaff]/.test(text);
    }

    function buildContent() {
      const wrap = document.createElement('div');
      wrap.className = 'ticker-content';
      items.forEach(item => {
        const span = document.createElement('span');
        const text = (item && item.gap) ? '　　' : item;
        span.className = 'ticker-text' + (isCJK(text) ? ' cjk' : '');
        span.textContent = text;
        wrap.appendChild(span);
      });
      return wrap;
    }

    document.fonts.ready.then(() => {
      const track = document.getElementById('ticker-track');
      const copy1 = buildContent();
      const copy2 = buildContent();
      track.appendChild(copy1);
      track.appendChild(copy2);

      // 1フレーム後に実際のピクセル幅を計測してからアニメーション開始
      requestAnimationFrame(() => {
        const copyWidth = copy1.getBoundingClientRect().width;
        let pos  = 0;
        let last = null;

        function tick(now) {
          if (last !== null) {
            pos -= PX_PER_SEC * (now - last) / 1000;
            if (pos <= -copyWidth) pos += copyWidth;
            track.style.transform = `translateX(${pos}px)`;
          }
          last = now;
          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      });
    });
  </script>
</body>
</html>
